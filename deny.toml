# cargo-deny configuration — see https://embarkstudios.github.io/cargo-deny/
# Enforced in CI per spec §16.6.
#
# We check the default-feature graph only: the `native-tls` feature is an
# explicit opt-in escape hatch (§5.1) and bringing in `openssl-sys` via that
# feature is intentional, not a regression. Users who enable `native-tls`
# have consented to the system-OpenSSL trade-off.

[licenses]
# Permissive licenses only — mirrors spec §16.6 policy and matches the
# crate's own MIT OR Apache-2.0 dual license.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[sources]
# Only allow crates from the official registry.
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]

[advisories]
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards         = "deny"
# Default-feature build must stay pure-Rust TLS; users who want system OpenSSL
# enable the `native-tls` Cargo feature explicitly.
deny = [
    { name = "openssl-sys" },
]
