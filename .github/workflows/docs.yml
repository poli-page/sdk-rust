name: Docs
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'docs/**'
      - 'scripts/extract-api/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'CHANGELOG.md'
      - 'MIGRATION.md'
      - 'LICENSE-MIT'
      - 'LICENSE-APACHE'
      - '.github/workflows/docs.yml'
  release: { types: [published] }
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Pinned nightly to match scripts/extract-api/main.ts:NIGHTLY_TOOLCHAIN.
      # Bump both together if rustdoc JSON format_version drifts.
      - name: Install nightly Rust for rustdoc JSON
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.91 pin
        with:
          toolchain: nightly-2026-05-15

      - name: Cache cargo registry + target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-rustdoc-${{ hashFiles('Cargo.lock') }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install docs deps
        working-directory: docs
        run: npm install --no-audit --no-fund

      - name: Build docs site (cargo +nightly rustdoc → MDX, then astro build)
        working-directory: docs
        run: npm run build

      - name: Verify index exists
        run: test -s docs/dist/index.html

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
