name: integration

# Hits the live API. Kept out of the per-PR `CI` workflow so
# (a) forks/contributors don't need a secret to land changes, and
# (b) upstream outages don't red-X every PR.
#
# Triggers:
#   - schedule:        nightly at 06:00 UTC.
#   - push to main:    catch regressions on the integration branch promptly.
#   - workflow_dispatch: manual re-run from the Actions tab when needed.
#
# Requires the `POLI_PAGE_API_KEY` repository secret. The `if:` on the job
# skips it on forks (where the secret isn't available), so fork PRs that
# trigger this via push-to-main on a downstream branch fail-soft rather
# than fail-hard.

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  integration:
    name: integration / live API
    runs-on: ubuntu-latest
    # Skip on forks where the API-key secret isn't available.
    if: github.repository == 'poli-page/sdk-rust'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo test (integration, --ignored)
        env:
          POLI_PAGE_API_KEY: ${{ secrets.POLI_PAGE_API_KEY }}
          POLI_PAGE_TEST_BASE_URL: ${{ secrets.POLI_PAGE_TEST_BASE_URL }}
        shell: bash
        run: |
          if [ -z "$POLI_PAGE_API_KEY" ]; then
            echo "POLI_PAGE_API_KEY secret not set — skipping integration tests"
            exit 0
          fi
          cargo test \
            --features integration \
            --test integration \
            --locked \
            -- --ignored
