name: integration

# Hits the deployed develop API. Kept out of the per-PR `CI` workflow so
# (a) forks/contributors don't need a secret to land changes, and
# (b) outages of `api-develop.poli.page` don't red-X every PR.
#
# Triggers:
#   - schedule:        nightly at 06:00 UTC.
#   - push to main:    catch regressions on the integration branch promptly.
#   - workflow_dispatch: manual re-run from the Actions tab when needed.
#
# Requires the `POLI_PAGE_API_KEY` repository secret. The `if:` on the job
# skips it on forks (where the secret isn't available), so fork PRs that
# trigger this via push-to-main on a downstream branch fail-soft rather
# than fail-hard.

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  integration:
    name: integration / develop API
    runs-on: ubuntu-latest
    # Skip on forks where the API-key secret isn't available.
    if: github.repository == 'poli-page/sdk-rust'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo test (integration, --ignored)
        env:
          POLI_PAGE_API_KEY: ${{ secrets.POLI_PAGE_API_KEY }}
        run: |
          cargo test \
            --features integration \
            --test integration \
            --locked \
            -- --ignored
