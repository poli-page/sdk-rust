name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  test:
    name: test / ${{ matrix.os }} / ${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, rust: stable }
          - { os: ubuntu-latest, rust: beta }
          - { os: macos-latest, rust: stable }
          - { os: windows-latest, rust: stable }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo doc
        run: cargo doc --no-deps --all-features
      - name: cargo test (all features)
        run: cargo test --all-features --locked
      - name: cargo test (blocking only)
        run: cargo test --no-default-features --features blocking --locked

  msrv:
    name: msrv / 1.93
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05
        with:
          toolchain: "1.93"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # --locked is critical: a regenerated Cargo.lock can pull dep versions
      # that have silently bumped their own MSRV past 1.93, masking the
      # regression. See spec §16.1 step 9.
      - run: cargo build --locked --all-features

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # Required by codecov-action's tokenless (OIDC) upload on public repos —
    # avoids needing a CODECOV_TOKEN secret. Mirrors the sdk-node / sdk-ruby setup.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-llvm-cov
      - name: generate lcov coverage
        run: cargo llvm-cov --all-features --workspace --locked --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./lcov.info
          use_oidc: true
          fail_ci_if_error: false

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2.0.19
        with:
          command: check
          # Scope to the default-feature graph per spec §16.6: `native-tls` is
          # an opt-in escape hatch (§5.1) and pulling in `openssl-sys` via that
          # feature is intentional, not a regression. The action's default of
          # `--all-features` would turn it on and trip the bans rule.
          arguments: ""

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  consumer-smoke:
    name: consumer-crate smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: build a tiny consumer crate
        shell: bash
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          cd "$tmp"
          cargo new --lib smoke
          cd smoke
          # `cargo new` already emits a `[dependencies]` section, so we add the
          # path dep via `cargo add` rather than appending a second `[dependencies]`
          # header (which would produce a TOML duplicate-key error).
          cargo add poli-page --path "$GITHUB_WORKSPACE"
          cat > src/lib.rs <<'RUST'
          use poli_page::PoliPage;

          pub fn ensure_construct() {
              let _ = PoliPage::builder();
          }
          RUST
          cargo build

  # TODO(phase 6): enable public-api diff and semver-checks once the first
  # version is published to crates.io — both tools compare the branch against
  # the latest published release, which doesn't exist pre-1.0.
  #
  # public-api:
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'pull_request'
  #   ...
  # semver-checks:
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'pull_request'
  #   ...
